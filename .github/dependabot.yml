# Schedule cronjob "0 5 * * *" = 05:00 UTC every day (all 7 days of the week).
# Fields are: minute hour day-of-month month day-of-week.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 5 * * *"
      timezone: "Etc/UTC"
    groups:
      dependencies:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 5 * * *"
      timezone: "Etc/UTC"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 5 * * *"
      timezone: "Etc/UTC"

  - package-ecosystem: "docker"
    directory: ".devcontainer"
    schedule:
      interval: "cron"
      cronjob: "0 5 * * *"
      timezone: "Etc/UTC"
