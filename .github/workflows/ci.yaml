name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure host ~/.gitconfig exists as a file
        run: touch ~/.gitconfig

      - uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3.1900000449
        with:
          env: |
            BETTER_AUTH_SECRET=ci-test-secret-not-for-production
            BETTER_AUTH_URL=http://localhost:3000
          runCmd: |
            set -e
            zsh -c '
              source ~/.zshrc
              echo "Shell: $SHELL"
              [[ "$ZSH" == *oh-my-zsh* ]] || { echo "FAIL: oh-my-zsh not found"; exit 1; }
              for plugin in zsh-autosuggestions zsh-syntax-highlighting fast-syntax-highlighting zsh-autocomplete you-should-use; do
                [[ -d ${ZSH_CUSTOM:-$ZSH/custom}/plugins/$plugin ]] || { echo "FAIL: plugin $plugin not installed"; exit 1; }
                echo "OK: $plugin"
              done
              echo "All zsh plugins verified"
            '
            pnpm format:check
            pnpm lint
            pnpm db:push
            pnpm test
            pnpm test:e2e

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
