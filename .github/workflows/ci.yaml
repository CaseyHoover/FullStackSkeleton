name: CI

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate

      - uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: setup
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: skeleton
          POSTGRES_PASSWORD: skeleton
          POSTGRES_DB: skeleton
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skeleton"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://skeleton:skeleton@localhost:5432/skeleton
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm db:push
      - run: pnpm test

  devcontainer:
    name: Dev Container Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            zsh -c '
              source ~/.zshrc
              echo "Shell: $SHELL"
              [[ "$ZSH" == *oh-my-zsh* ]] || { echo "FAIL: oh-my-zsh not found"; exit 1; }
              for plugin in zsh-autosuggestions zsh-syntax-highlighting fast-syntax-highlighting zsh-autocomplete you-should-use; do
                [[ -d ${ZSH_CUSTOM:-$ZSH/custom}/plugins/$plugin ]] || { echo "FAIL: plugin $plugin not installed"; exit 1; }
                echo "OK: $plugin"
              done
              echo "All zsh plugins verified"
            '
