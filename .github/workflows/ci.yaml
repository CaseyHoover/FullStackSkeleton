name: CI

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: devcontainers/ci@v0.3
        with:
          env: |
            BETTER_AUTH_SECRET=ci-test-secret-not-for-production
            BETTER_AUTH_URL=http://localhost:3000
          runCmd: |
            set -e
            zsh -c '
              source ~/.zshrc
              echo "Shell: $SHELL"
              [[ "$ZSH" == *oh-my-zsh* ]] || { echo "FAIL: oh-my-zsh not found"; exit 1; }
              for plugin in zsh-autosuggestions zsh-syntax-highlighting fast-syntax-highlighting zsh-autocomplete you-should-use; do
                [[ -d ${ZSH_CUSTOM:-$ZSH/custom}/plugins/$plugin ]] || { echo "FAIL: plugin $plugin not installed"; exit 1; }
                echo "OK: $plugin"
              done
              echo "All zsh plugins verified"
            '
            pnpm lint
            pnpm db:push
            pnpm test
            pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
