name: Dependency Review

on:
  pull_request:
    branches: [main]
    paths-ignore: ["wiki/**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          comment-summary-in-pr: on-failure
          allow-licenses: >-
            0BSD,
            Apache-2.0,
            BSD-2-Clause,
            BSD-3-Clause,
            BlueOak-1.0.0,
            CC-BY-4.0,
            CC0-1.0,
            ISC,
            MIT,
            MPL-2.0,
            Python-2.0,
            Unlicense
          # @sentry/cli ships under FSL-1.1-MIT (source-available, converts to MIT
          # after 2 years). Scope-allowed because we depend on Sentry.
          # split@0.2.x has no license field but the upstream repo is MIT.
          allow-dependencies-licenses: >-
            pkg:npm/%40sentry/cli,
            pkg:npm/split
